<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">
      <svg width="36" height="36" viewBox="0 0 40 40" fill="none">
        <rect width="40" height="40" rx="8" fill="#22C55E"/>
        <path d="M8 28L14 12L20 22L26 16L32 28H8Z" fill="white"/>
      </svg>
      <span>TechNest</span>
    </div>

    <h1 class="auth-title">Créer un compte</h1>
    <p class="auth-sub">Rejoignez la communauté TechNest</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">

      <div class="form-row">
        <div class="form-group">
          <label>Prénom</label>
          <input type="text" formControlName="first_name" placeholder="Jean"
            [class.is-invalid]="f['first_name'].invalid && f['first_name'].touched" />
          <div class="error-msg" *ngIf="f['first_name'].invalid && f['first_name'].touched">Champ obligatoire.</div>
        </div>
        <div class="form-group">
          <label>Nom</label>
          <input type="text" formControlName="last_name" placeholder="Dupont"
            [class.is-invalid]="f['last_name'].invalid && f['last_name'].touched" />
          <div class="error-msg" *ngIf="f['last_name'].invalid && f['last_name'].touched">Champ obligatoire.</div>
        </div>
      </div>

      <div class="form-group">
        <label>Nom d'utilisateur</label>
        <input type="text" formControlName="username" placeholder="jean_dupont"
          [class.is-invalid]="f['username'].invalid && f['username'].touched" autocomplete="username" />
        <div class="error-msg" *ngIf="f['username'].invalid && f['username'].touched">
          <span *ngIf="f['username'].errors?.['required']">Obligatoire.</span>
          <span *ngIf="f['username'].errors?.['minlength']">Min. 3 caractères.</span>
        </div>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="jean@email.com"
          [class.is-invalid]="f['email'].invalid && f['email'].touched" autocomplete="email" />
        <div class="error-msg" *ngIf="f['email'].invalid && f['email'].touched">
          <span *ngIf="f['email'].errors?.['required']">Obligatoire.</span>
          <span *ngIf="f['email'].errors?.['email']">Email invalide.</span>
        </div>
      </div>

      <div class="form-group">
        <label>Mot de passe</label>
        <div class="input-wrapper">
          <input [type]="showPassword ? 'text' : 'password'" formControlName="password"
            placeholder="••••••••" [class.is-invalid]="f['password'].invalid && f['password'].touched"
            autocomplete="new-password" />
          <button type="button" class="eye-btn" (click)="showPassword = !showPassword">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
              <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8zM1.173 8a13.133 13.133 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.133 13.133 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5c-2.12 0-3.879-1.168-5.168-2.457A13.134 13.134 0 0 1 1.172 8z"/>
              <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5zM4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0z"/>
            </svg>
          </button>
        </div>
        <div class="error-msg" *ngIf="f['password'].invalid && f['password'].touched">
          <span *ngIf="f['password'].errors?.['required']">Obligatoire.</span>
          <span *ngIf="f['password'].errors?.['minlength']">Min. 6 caractères.</span>
        </div>
      </div>

      <div class="form-group">
        <label>Confirmer le mot de passe</label>
        <div class="input-wrapper">
          <input [type]="showConfirm ? 'text' : 'password'" formControlName="confirm_password"
            placeholder="••••••••" [class.is-invalid]="f['confirm_password'].invalid && f['confirm_password'].touched"
            autocomplete="new-password" />
          <button type="button" class="eye-btn" (click)="showConfirm = !showConfirm">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
              <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8zM1.173 8a13.133 13.133 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.133 13.133 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5c-2.12 0-3.879-1.168-5.168-2.457A13.134 13.134 0 0 1 1.172 8z"/>
              <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5zM4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0z"/>
            </svg>
          </button>
        </div>
        <div class="error-msg" *ngIf="f['confirm_password'].errors?.['mismatch']">
          Les mots de passe ne correspondent pas.
        </div>
      </div>

      <button type="submit" class="btn-submit" [disabled]="form.invalid || loading">
        <span *ngIf="!loading">Créer mon compte</span>
        <span *ngIf="loading">Création en cours...</span>
      </button>
    </form>

    <p class="auth-footer">
      Déjà un compte ? <a routerLink="/login">Se connecter</a>
    </p>

  </div>
</div>
